<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OpenFMR Data Steward Admin UI — manage and resolve FHIR resource conflicts across the Health Information Exchange." />
    <title>{% block title %}OpenFMR Admin{% endblock %}</title>

    <!-- ----------------------------------------------------------------- -->
    <!-- Bootstrap 5 CDN (CSS only — no jQuery dependency)                 -->
    <!-- ----------------------------------------------------------------- -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/3YZGK6zg0bDZaQyGJOr8F2lkPAdULA"
        crossorigin="anonymous"
    />

    <!-- ----------------------------------------------------------------- -->
    <!-- Bootstrap Icons                                                    -->
    <!-- ----------------------------------------------------------------- -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet"
    />

    <!-- ----------------------------------------------------------------- -->
    <!-- Custom application styles                                          -->
    <!-- ----------------------------------------------------------------- -->
    <link rel="stylesheet" href="/static/style.css" />

    {% block head_extra %}{% endblock %}
</head>
<body>

    <!-- =================================================================
         Navbar
         ================================================================= -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <i class="bi bi-clipboard2-pulse-fill"></i>
                <span>OpenFMR <small class="text-muted">Admin</small></span>
            </a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- =================================================================
         Page content
         ================================================================= -->
    <main class="container-fluid py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- =================================================================
         Footer
         ================================================================= -->
    <footer class="text-center text-muted py-3 border-top mt-auto">
        <small>&copy; {{ now().year if now is defined else "2026" }} OpenFMR Project &mdash; Data Steward Admin UI</small>
    </footer>

    <!-- ----------------------------------------------------------------- -->
    <!-- Bootstrap 5 JS bundle (Popper included)                            -->
    <!-- ----------------------------------------------------------------- -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
    ></script>

    {% block scripts_extra %}{% endblock %}
</body>
</html>
